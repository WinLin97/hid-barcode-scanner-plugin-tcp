name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      # KEYSTORE_FILE is the base64 of your release .jks (e.g. `base64 -w0 key.jks`).
      - name: Extract keystore file
        run: echo "${{ secrets.KEYSTORE_FILE }}" | base64 -d > $GITHUB_WORKSPACE/signing-key.jks

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Inject the real keystore so the release APK is properly signed. This overrides the
      # build.gradle `signingConfigs.debug` fallback (which stays for local debug builds).
      # No ABI splits / AAB: the plugin has no native code, so one universal APK is enough.
      # versionName is taken from the tag (e.g. tag "v0.0.3" -> versionName "0.0.3"), so the
      # released APK's version can never drift from the tag.
      - name: Build signed release APK
        run: |
          VERSION_NAME="${GITHUB_REF_NAME#v}"
          ./gradlew assembleRelease --no-daemon --stacktrace \
            -PversionName="$VERSION_NAME" \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/signing-key.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PW }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEYSTORE_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEYSTORE_PW }}

      - name: Remove keystore file
        run: rm $GITHUB_WORKSPACE/signing-key.jks

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          draft: true
          files: app/build/outputs/apk/release/app-release.apk
